<script type="text/javascript">
  (function() {
    // Get query from URL
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q') || '';
    
    // Fill search boxes
    document.getElementById('jot-ui-searchInput').value = query;
    document.getElementById('search-query-main').value = query;
    
    const resultsContainer = document.getElementById('search-results-list');
    const statsContainer = document.getElementById('search-stats');
    
    if (!query.trim()) {
      statsContainer.textContent = '';
      resultsContainer.innerHTML = '<p>Please enter a search query above.</p>';
      return;
    }
    
    // Fetch index
    fetch('search_index.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      })
      .then(index => {
        performSearch(index, query.trim());
      })
      .catch(error => {
        console.error('Error fetching search index:', error);
        resultsContainer.innerHTML = '<p style="color: red;">Error loading search index. Please ensure you are running this on a web server.</p>';
      });
      
    function performSearch(index, q) {
      const terms = q.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      if (terms.length === 0) return;
      
      const results = [];
      
      index.forEach(item => {
        const titleLower = item.title.toLowerCase();
        const contentLower = item.content.toLowerCase();
        
        let score = 0;
        let matchedTerms = 0;
        
        terms.forEach(term => {
          let termScore = 0;
          
          // Exact title match
          if (titleLower === term) {
            termScore += 100;
          } else if (titleLower.includes(term)) {
            termScore += 30;
          }
          
          // Content matches
          const termRegex = new RegExp(escapeRegExp(term), 'g');
          const matches = contentLower.match(termRegex);
          if (matches) {
            termScore += matches.length * 2;
          }
          
          if (termScore > 0) {
            score += termScore;
            matchedTerms++;
          }
        });
        
        // Boost score if all terms are matched
        if (matchedTerms === terms.length) {
          score += 50;
        }
        
        if (score > 0) {
          results.push({
            item: item,
            score: score
          });
        }
      });
      
      // Sort results by score (descending)
      results.sort((a, b) => b.score - a.score);
      
      // Render results
      statsContainer.textContent = `Found ${results.length} result(s) for "${q}"`;
      
      if (results.length === 0) {
        resultsContainer.innerHTML = '<p>No results found. Try using different keywords.</p>';
        return;
      }
      
      let html = '<div class="search-results-list">';
      results.forEach(res => {
        const item = res.item;
        const snippet = generateSnippet(item.content, terms);
        
        html += `
          <div class="search-result-item">
            <div class="search-result-title">
              <a href="${item.path}">${escapeHtml(item.title)}</a>
            </div>
            <div class="search-result-url">${escapeHtml(item.path)}</div>
            <div class="search-result-snippet">${snippet}</div>
          </div>
        `;
      });
      html += '</div>';
      
      resultsContainer.innerHTML = html;
    }
    
    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    function escapeHtml(string) {
      return string
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    
    function generateSnippet(content, terms) {
      if (!content) return '';
      
      const contentLower = content.toLowerCase();
      let bestIndex = 0;
      let highestMatchCount = 0;
      
      // Find the best region of content to show as a snippet
      // Look at blocks of 200 characters
      const blockSize = 200;
      for (let i = 0; i < content.length; i += 50) {
        const block = contentLower.substring(i, i + blockSize);
        let matchCount = 0;
        terms.forEach(term => {
          if (block.includes(term)) {
            matchCount++;
          }
        });
        if (matchCount > highestMatchCount) {
          highestMatchCount = matchCount;
          bestIndex = i;
        }
      }
      
      let start = Math.max(0, bestIndex - 20);
      let end = Math.min(content.length, start + blockSize);
      
      // Adjust start/end to not cut words if possible
      if (start > 0) {
        const firstSpace = content.indexOf(' ', start);
        if (firstSpace !== -1 && firstSpace < start + 20) {
          start = firstSpace + 1;
        }
      }
      if (end < content.length) {
        const lastSpace = content.lastIndexOf(' ', end);
        if (lastSpace !== -1 && lastSpace > end - 20) {
          end = lastSpace;
        }
      }
      
      let snippet = content.substring(start, end);
      if (start > 0) snippet = '...' + snippet;
      if (end < content.length) snippet = snippet + '...';
      
      // Highlight terms
      snippet = escapeHtml(snippet);
      terms.forEach(term => {
        const termRegex = new RegExp(escapeRegExp(escapeHtml(term)), 'gi');
        snippet = snippet.replace(termRegex, match => `<mark>${match}</mark>`);
      });
      
      return snippet;
    }
  })();
</script>
